http:
  routers:
    veklom-api:
      entryPoints:
        - http
        - https
      rule: "Host(`veklom.com`) || Host(`www.veklom.com`) || Host(`app.veklom.com`) || Host(`api.veklom.com`)"
      service: veklom-api
      tls:
        certResolver: letsencrypt
    veklom-control:
      entryPoints:
        - http
        - https
      rule: "Host(`control.veklom.com`)"
      service: veklom-control
      tls:
        certResolver: letsencrypt
